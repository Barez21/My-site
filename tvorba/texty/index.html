<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texty — b-place.org</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #080810;
      --text:   #e8e8f0;
      --muted:  #7070a0;
      --dimmed: #3a3a5a;
      --border: rgba(255,255,255,0.07);
      --rose:   #f472b6;
      --violet: #a78bfa;
      --teal:   #00d4aa;

      /* Paper */
      --paper:      #f4ede0;
      --paper-dark: #e8dfd0;
      --ink:        #2a1f14;
      --ink-muted:  #7a6a58;

      /* Wood shelf */
      --wood-top:  #3d2b1a;
      --wood-mid:  #2e1f0f;
      --wood-edge: #1e1208;

      --poem-font: 'Lora', Georgia, serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }

    .glow-1, .glow-2 {
      position: fixed; border-radius: 50%;
      filter: blur(140px); pointer-events: none; z-index: 0; opacity: 0.1;
    }
    .glow-1 { width: 600px; height: 600px; background: var(--rose);   top: -200px; right: -100px; }
    .glow-2 { width: 500px; height: 500px; background: var(--violet); bottom: -100px; left: -150px; }

    /* ── NAV ── */
    .topnav {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 10px;
      padding: 1.6rem 2.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em; color: var(--dimmed);
    }
    .topnav a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .topnav a:hover { color: var(--text); }
    .breadcrumb-sep { color: var(--dimmed); }
    .breadcrumb-current { color: var(--rose); }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 1rem 2.5rem 0;
    }
    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.18em;
      color: var(--muted); text-transform: uppercase; margin-bottom: 0.6rem;
    }
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 800; line-height: 0.95;
      letter-spacing: -0.03em; color: #fff;
    }
    .hero-title span {
      background: linear-gradient(135deg, var(--rose) 0%, var(--violet) 70%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ─────────────────────────────────────────
       LIBRARY / BOOKSHELF VIEW
    ───────────────────────────────────────── */
    .library {
      position: relative; z-index: 1;
      max-width: 1000px; margin: 3rem auto 0;
      padding: 0 2rem 4rem;
    }

    /* The shelf structure */
    .shelf {
      position: relative;
      padding: 3rem 3rem 0;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      min-height: 260px;
    }

    /* Wooden shelf board */
    .shelf::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      background: linear-gradient(180deg,
        var(--wood-top) 0%,
        var(--wood-mid) 40%,
        var(--wood-edge) 100%
      );
      border-radius: 3px 3px 0 0;
      box-shadow:
        0 4px 20px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.4);
    }

    /* Shelf back wall */
    .shelf::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #0a0808 0%, #120c06 100%);
      border-radius: 4px;
    }

    /* ── BOOK ── */
    .book-wrap {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: bottom center;
    }

    .book-wrap:hover {
      transform: translateY(-28px);
    }

    .book-wrap:hover .book-spine {
      box-shadow:
        4px 0 12px rgba(0,0,0,0.5),
        inset -2px 0 6px rgba(0,0,0,0.3),
        -2px 0 20px rgba(255,200,100,0.08);
    }

    .book-spine {
      width: 52px;
      height: 220px;
      border-radius: 2px 0 0 2px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.3s;
      box-shadow:
        4px 0 8px rgba(0,0,0,0.4),
        inset -2px 0 4px rgba(0,0,0,0.25),
        inset 2px 0 4px rgba(255,255,255,0.06);
    }

    /* Leather texture via gradient */
    .book-spine::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.06) 3px,
        rgba(0,0,0,0.06) 4px
      );
    }

    /* Decorative top/bottom bands */
    .book-spine::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 14px; bottom: 14px;
      border-top: 1px solid rgba(255,255,255,0.12);
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .book-title-spine {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-family: 'Lora', serif;
      font-size: 11px;
      font-style: italic;
      letter-spacing: 0.08em;
      color: rgba(255,220,140,0.85);
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      position: relative; z-index: 1;
      max-height: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 4px;
    }

    /* Book page edge (right side) */
    .book-pages {
      position: absolute;
      right: -8px; top: 3px; bottom: 3px;
      width: 8px;
      background: repeating-linear-gradient(
        90deg,
        #e8ddd0 0px, #d4c9bc 1px,
        #ede3d6 1px, #ede3d6 3px
      );
      border-radius: 0 1px 1px 0;
      box-shadow: 2px 0 4px rgba(0,0,0,0.3);
    }

    /* LOADING state book */
    .book-placeholder {
      width: 52px; height: 220px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
      border: 1px dashed rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
    }

    .spinner-small {
      width: 16px; height: 16px;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-top-color: var(--rose);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty library ── */
    .shelf-empty {
      position: relative; z-index: 2;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em;
      padding-bottom: 2rem;
      align-self: center;
    }

    /* Error */
    .shelf-error {
      position: relative; z-index: 1;
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    /* ─────────────────────────────────────────
       OPEN BOOK OVERLAY
    ───────────────────────────────────────── */
    .book-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(4,3,8,0.92);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .book-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* Close button */
    .close-btn {
      position: absolute;
      top: 2rem; right: 2rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      z-index: 10;
    }
    .close-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); }

    /* ── The open book ── */
    .open-book {
      position: relative;
      width: min(900px, 92vw);
      height: min(600px, 85vh);
      display: flex;
      transform: scale(0.88) translateY(30px);
      transition: transform 0.45s cubic-bezier(0.34, 1.4, 0.64, 1);
      filter: drop-shadow(0 40px 80px rgba(0,0,0,0.7));
    }

    .book-overlay.visible .open-book {
      transform: scale(1) translateY(0);
    }

    /* Spine in the middle */
    .open-book-spine {
      width: 24px;
      flex-shrink: 0;
      background: linear-gradient(90deg, #1a1008 0%, #2e1f0f 40%, #1a1008 100%);
      box-shadow:
        0 0 20px rgba(0,0,0,0.8),
        inset 1px 0 3px rgba(255,255,255,0.05),
        inset -1px 0 3px rgba(255,255,255,0.05);
      z-index: 5;
    }

    /* ── PAGE ── */
    .book-page {
      flex: 1;
      background: var(--paper);
      position: relative;
      overflow: hidden;
      padding: 3rem 2.8rem;
    }

    /* Paper texture */
    .book-page::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='512' height='512' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .book-page-left {
      border-radius: 4px 0 0 4px;
      background: linear-gradient(90deg, #ece5d8 0%, var(--paper) 8%);
    }

    .book-page-right {
      border-radius: 0 4px 4px 0;
      background: linear-gradient(270deg, #ece5d8 0%, var(--paper) 8%);
      perspective: 1200px;
    }

    /* Vignette shadow on inner edges */
    .book-page-left::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(90deg, transparent 85%, rgba(0,0,0,0.08) 100%);
    }

    .book-page-right::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(270deg, transparent 85%, rgba(0,0,0,0.08) 100%);
    }

    .page-content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }

    /* ── LEFT PAGE: TABLE OF CONTENTS ── */
    .toc-title {
      font-family: 'Lora', serif;
      font-size: 11px;
      font-style: italic;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.5rem;
    }

    .toc-collection-name {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(42,31,20,0.15);
    }

    .toc-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .toc-list::-webkit-scrollbar { display: none; }

    .toc-item {
      display: flex;
      align-items: baseline;
      gap: 0;
      padding: 0.45rem 0;
      cursor: pointer;
      border-bottom: 1px dotted rgba(42,31,20,0.1);
      transition: color 0.15s;
    }

    .toc-item:hover { color: var(--ink); }
    .toc-item:last-child { border-bottom: none; }

    .toc-item.active .toc-item-name {
      font-style: italic;
      color: var(--ink);
    }

    .toc-num {
      font-family: 'Lora', serif;
      font-size: 10px;
      color: var(--ink-muted);
      width: 24px;
      flex-shrink: 0;
    }

    .toc-dots {
      flex: 1;
      border-bottom: 1px dotted rgba(42,31,20,0.2);
      margin: 0 6px;
      position: relative;
      top: -3px;
    }

    .toc-item-name {
      font-family: 'Lora', serif;
      font-size: 13px;
      color: rgba(42,31,20,0.7);
      transition: color 0.15s;
      max-width: 70%;
    }

    /* Page number at bottom */
    .page-number {
      font-family: 'Lora', serif;
      font-size: 10px;
      font-style: italic;
      color: var(--ink-muted);
      text-align: center;
      margin-top: 1rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(42,31,20,0.1);
    }

    /* ── RIGHT PAGE: POEM ── */
    .poem-page-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Flipping animation */
    .poem-page-inner {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      transform-origin: left center;
      transition: transform 0.55s cubic-bezier(0.645, 0.045, 0.355, 1.000), opacity 0.25s ease;
    }

    .poem-page-inner.flip-out {
      transform: perspective(1200px) rotateY(-25deg);
      opacity: 0;
    }

    .poem-page-inner.flip-in {
      transform: perspective(1200px) rotateY(25deg);
      opacity: 0;
    }

    .poem-pg-title {
      font-family: 'Lora', serif;
      font-size: 18px;
      font-weight: 500;
      font-style: italic;
      color: var(--ink);
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .poem-pg-divider {
      width: 32px; height: 1px;
      background: rgba(42,31,20,0.25);
      margin: 0.8rem 0 1.4rem;
    }

    .poem-pg-body {
      flex: 1;
      font-family: var(--poem-font);
      font-size: 15px;
      line-height: 2;
      color: var(--ink);
      text-align: center;
      overflow-y: auto;
      scrollbar-width: none;
      font-feature-settings: 'rand' 1, 'calt' 1;
    }
    .poem-pg-body::-webkit-scrollbar { display: none; }

    .poem-pg-stanza { display: block; height: 1em; }

    .poem-pg-empty {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Lora', serif;
      font-size: 13px;
      font-style: italic;
      color: var(--ink-muted);
    }

    /* ── NAVIGATION ARROWS ── */
    .book-nav {
      position: absolute;
      bottom: 1.5rem;
      right: 2.8rem;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .book-nav-btn {
      width: 32px; height: 32px;
      background: rgba(42,31,20,0.08);
      border: 1px solid rgba(42,31,20,0.15);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      color: var(--ink-muted);
      transition: background 0.2s, color 0.2s;
    }
    .book-nav-btn:hover { background: rgba(42,31,20,0.15); color: var(--ink); }
    .book-nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .open-book { flex-direction: column; height: min(85vh, 700px); }
      .open-book-spine { width: 100%; height: 16px; }
      .book-page-left { border-radius: 4px 4px 0 0; }
      .book-page-right { border-radius: 0 0 4px 4px; }
      .shelf { padding: 2rem 1.5rem 0; gap: 8px; }
      .book-spine { width: 42px; height: 180px; }
    }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.1em;
      color: var(--dimmed);
    }
  </style>
</head>
<body>

  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <nav class="topnav">
    <a href="/">b-place</a>
    <span class="breadcrumb-sep">›</span>
    <a href="/tvorba/">tvorba</a>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current">texty</span>
  </nav>

  <div class="hero">
    <p class="hero-eyebrow">Sbírky básní</p>
    <h1 class="hero-title"><span>Texty</span></h1>
  </div>

  <div class="library">
    <div class="shelf" id="shelf">
      <div class="book-placeholder"><div class="spinner-small"></div></div>
    </div>
  </div>

  <!-- OPEN BOOK OVERLAY -->
  <div class="book-overlay" id="overlay">
    <button class="close-btn" id="closeBtn">✕ &nbsp;Zavřít</button>
    <div class="open-book" id="openBook">

      <!-- LEFT PAGE: Table of contents -->
      <div class="book-page book-page-left">
        <div class="page-content">
          <div class="toc-title">Obsah</div>
          <div class="toc-collection-name" id="tocCollectionName"></div>
          <div class="toc-list" id="tocList"></div>
          <div class="page-number" id="leftPageNum">i</div>
        </div>
      </div>

      <!-- SPINE -->
      <div class="open-book-spine"></div>

      <!-- RIGHT PAGE: Poem -->
      <div class="book-page book-page-right">
        <div class="page-content">
          <div class="poem-page-wrap" id="poemPageWrap">
            <div class="poem-page-inner" id="poemPageInner">
              <div class="poem-pg-empty">Vyberte báseň ze seznamu vlevo →</div>
            </div>
          </div>
          <div class="book-nav">
            <button class="book-nav-btn" id="prevBtn" title="Předchozí" disabled>←</button>
            <button class="book-nav-btn" id="nextBtn" title="Další" disabled>→</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer>&copy; <span id="yr"></span> &nbsp;b-place.org</footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // ── CONFIG ──────────────────────────────────────────────────────────────
    const REPO   = 'Barez21/My-site';
    const FOLDER = 'tvorba/texty/básně';
    const API    = `https://api.github.com/repos/${REPO}/contents/`;

    // Book spine colors (leather tones)
    const LEATHER = [
      ['#5c2d0e','#7a3d12'],
      ['#1a2e4a','#243d63'],
      ['#2d1a3a','#3d2252'],
      ['#1a3a2d','#22523d'],
      ['#3a2a0e','#523c12'],
      ['#2e1a1a','#522222'],
      ['#1a1a3a','#222252'],
      ['#3a1a2d','#52223d'],
    ];

    // ── STATE ────────────────────────────────────────────────────────────────
    let collections = [];
    let currentCollection = null;  // { name, poems: [{name, url}] }
    let currentPoemIndex = -1;

    // ── UTILS ────────────────────────────────────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function cleanName(filename) {
      return filename
        .replace(/\.[^.]+$/, '')
        .replace(/^\d+[\s.\-–—]+/, '')
        .trim();
    }

    async function fetchJSON(path) {
      const r = await fetch(API + path, { headers: { Accept: 'application/vnd.github+json' } });
      if (!r.ok) throw new Error(`GitHub API: ${r.status}`);
      return r.json();
    }

    function decodeB64(str) {
      return decodeURIComponent(
        atob(str.replace(/\s/g,''))
          .split('').map(c => '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')
      );
    }

    function formatPoem(text) {
      const esc2 = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return esc2.split(/\n{2,}/)
        .map(s => s.trim()).filter(Boolean)
        .map(s => `<span>${s.replace(/\n/g,'<br>')}</span>`)
        .join('<span class="poem-pg-stanza"></span>');
    }

    // ── BOOKSHELF ────────────────────────────────────────────────────────────
    async function loadShelf() {
      const shelf = document.getElementById('shelf');
      try {
        const items = await fetchJSON(encodeURIComponent(FOLDER).replace(/%2F/g,'/'));
        const dirs  = items.filter(i => i.type === 'dir');

        if (!dirs.length) {
          shelf.innerHTML = `<div class="shelf-empty">Žádné sbírky zatím</div>`;
          return;
        }

        collections = dirs.map((d, i) => ({ name: d.name, colors: LEATHER[i % LEATHER.length], poems: null }));

        shelf.innerHTML = collections.map((col, i) => `
          <div class="book-wrap" data-idx="${i}" title="${esc(col.name)}">
            <div class="book-spine" style="background: linear-gradient(90deg, ${col.colors[0]} 0%, ${col.colors[1]} 50%, ${col.colors[0]} 100%);">
              <span class="book-title-spine">${esc(col.name)}</span>
            </div>
            <div class="book-pages"></div>
          </div>
        `).join('');

        document.querySelectorAll('.book-wrap').forEach(el => {
          el.addEventListener('click', () => openCollection(parseInt(el.dataset.idx)));
        });

      } catch(e) {
        shelf.innerHTML = `<div class="shelf-error">Nepodařilo se načíst sbírky: ${esc(e.message)}</div>`;
      }
    }

    // ── OPEN COLLECTION ──────────────────────────────────────────────────────
    async function openCollection(idx) {
      const col = collections[idx];

      // Load poems if not yet loaded
      if (!col.poems) {
        try {
          const items = await fetchJSON(
            encodeURIComponent(FOLDER).replace(/%2F/g,'/') + '/' +
            encodeURIComponent(col.name)
          );
          col.poems = items
            .filter(i => i.type === 'file')
            .map(f => ({ name: cleanName(f.name), url: f.url }));
        } catch(e) {
          col.poems = [];
        }
      }

      currentCollection = col;
      currentPoemIndex = -1;

      // Populate TOC
      document.getElementById('tocCollectionName').textContent = col.name;
      const tocList = document.getElementById('tocList');

      if (!col.poems.length) {
        tocList.innerHTML = `<div style="font-family:'Lora',serif;font-style:italic;font-size:13px;color:var(--ink-muted);padding:1rem 0">Sbírka je prázdná</div>`;
      } else {
        tocList.innerHTML = col.poems.map((p, i) => `
          <div class="toc-item" data-poem-idx="${i}">
            <span class="toc-num">${i + 1}</span>
            <span class="toc-item-name">${esc(p.name)}</span>
            <span class="toc-dots"></span>
          </div>
        `).join('');

        tocList.querySelectorAll('.toc-item').forEach(el => {
          el.addEventListener('click', () => showPoem(parseInt(el.dataset.poemIdx)));
        });
      }

      // Show empty right page
      setRightPage(null);

      // Update nav buttons
      updateNavBtns();

      // Show overlay
      document.getElementById('overlay').classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    // ── SHOW POEM ────────────────────────────────────────────────────────────
    async function showPoem(idx, direction = 'next') {
      if (!currentCollection || !currentCollection.poems[idx]) return;
      const poem = currentCollection.poems[idx];

      // Animate out
      const inner = document.getElementById('poemPageInner');
      inner.classList.add(direction === 'next' ? 'flip-out' : 'flip-in');

      await sleep(200);

      // Set loading
      inner.innerHTML = `<div class="poem-pg-empty"><div class="spinner-small"></div></div>`;
      inner.classList.remove('flip-out','flip-in');

      // Trigger flip-in from opposite side
      inner.classList.add(direction === 'next' ? 'flip-in' : 'flip-out');
      await sleep(20);
      inner.classList.remove('flip-in','flip-out');

      // Fetch poem
      try {
        const data = await fetch(poem.url, { headers: { Accept: 'application/vnd.github+json' } }).then(r => r.json());
        const raw  = data.encoding === 'base64' ? decodeB64(data.content) : data.content;
        setRightPage({ title: poem.name, body: formatPoem(raw) });
      } catch(e) {
        setRightPage({ title: poem.name, body: `<span style="color:var(--ink-muted);font-style:italic">Nepodařilo se načíst báseň.</span>` });
      }

      currentPoemIndex = idx;

      // Update TOC active state
      document.querySelectorAll('.toc-item').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
      });

      // Page numbers
      document.getElementById('leftPageNum').textContent = `${idx + 1} — ${currentCollection.poems.length}`;

      updateNavBtns();
    }

    function setRightPage(poem) {
      const inner = document.getElementById('poemPageInner');
      if (!poem) {
        inner.innerHTML = `<div class="poem-pg-empty">Vyberte báseň ze seznamu →</div>`;
        return;
      }
      inner.innerHTML = `
        <div class="poem-pg-title">${esc(poem.title)}</div>
        <div class="poem-pg-divider"></div>
        <div class="poem-pg-body">${poem.body}</div>
      `;
    }

    function updateNavBtns() {
      const poems = currentCollection?.poems || [];
      document.getElementById('prevBtn').disabled = currentPoemIndex <= 0;
      document.getElementById('nextBtn').disabled = currentPoemIndex < 0 || currentPoemIndex >= poems.length - 1;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ── NAV BUTTONS ──────────────────────────────────────────────────────────
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentPoemIndex > 0) showPoem(currentPoemIndex - 1, 'prev');
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (currentCollection && currentPoemIndex < currentCollection.poems.length - 1)
        showPoem(currentPoemIndex + 1, 'next');
    });

    // ── CLOSE ────────────────────────────────────────────────────────────────
    document.getElementById('closeBtn').addEventListener('click', closeBook);
    document.getElementById('overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('overlay')) closeBook();
    });

    function closeBook() {
      document.getElementById('overlay').classList.remove('visible');
      document.body.style.overflow = '';
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (!document.getElementById('overlay').classList.contains('visible')) return;
      if (e.key === 'Escape') closeBook();
      if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
      if (e.key === 'ArrowLeft')  document.getElementById('prevBtn').click();
    });

    // ── BOOT ─────────────────────────────────────────────────────────────────
    loadShelf();
  </script>

</body>
</html>
