<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texty — b-place.org</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <nav class="topnav">
    <a href="/">b-place</a><span style="color:var(--dimmed)">›</span>
    <a href="/tvorba/">tvorba</a><span style="color:var(--dimmed)">›</span>
    <span style="color:var(--rose)">texty</span>
  </nav>

  <div class="hero">
    <p class="hero-eyebrow">Knihovna textů</p>
    <h1 class="hero-title"><span>Texty</span></h1>
  </div>

  <div class="library">
    <div class="shelf" id="shelf">
      <div class="shelf-loading"><div class="spin"></div></div>
    </div>
  </div>

  <!-- ══ OVERLAY ══ -->
  <div class="overlay" id="overlay">
    <button class="close-btn" id="closeBtn">✕ &nbsp;Zavřít</button>

    <!-- CLOSED BOOK -->
    <div class="closed-scene" id="closedScene">
      <div class="closed-book-3d" id="closedBook">
        <div class="closed-spine" id="closedSpine">
          <span id="closedSpineText"></span>
        </div>
        <div class="closed-cover" id="closedCover">
          <div class="cover-inner">
            <span class="cover-orn">✦ &nbsp; ✦ &nbsp; ✦</span>
            <div class="cover-title-text" id="coverTitleText"></div>
            <div class="cover-sub">Sbírka básní</div>
            <span class="cover-orn">✦ &nbsp; ✦ &nbsp; ✦</span>
          </div>
        </div>
        <div class="closed-pages-edge"></div>
      </div>
      <div class="open-hint">klikněte pro otevření</div>
    </div>

    <!-- OPEN BOOK -->
    <div class="open-scene" id="openScene">
      <div class="open-book">

        <!-- LEFT PAGE -->
        <div class="bk-page bk-page-l" id="pageL">
          <div class="pg-content" id="pageLC">
            <div class="pg-loading"><div class="spin spin-sm"></div></div>
          </div>
          <div class="flipper" id="flipL">
            <div class="flip-face" id="flipLF"></div>
            <div class="flip-face is-back" id="flipLB"></div>
          </div>
        </div>

        <div class="bk-spine"></div>

        <!-- RIGHT PAGE -->
        <div class="bk-page bk-page-r" id="pageR">
          <div class="pg-content" id="pageRC">
            <div class="pg-loading"><div class="spin spin-sm"></div></div>
          </div>
          <div class="flipper" id="flipR">
            <div class="flip-face" id="flipRF"></div>
            <div class="flip-face is-back" id="flipRB"></div>
          </div>
        </div>

      </div>

      <div class="bk-nav">
        <button class="nav-btn" id="prevBtn" disabled>←</button>
        <span class="pg-indicator" id="pgInd"></span>
        <button class="nav-btn" id="nextBtn" disabled>→</button>
      </div>
    </div>

  </div><!-- /overlay -->

  <footer>&copy; <span id="yr"></span> &nbsp;b-place.org</footer>
  <script src="script.js?v=5"></script>
</body>
</html>
